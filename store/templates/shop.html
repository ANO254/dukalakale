{% extends "base.html" %}
{% block content %}

<style>
  /* Shop Title */
  .shop-title {
    margin-bottom: 2rem;
    font-weight: bold;
    text-align: center;
  }

  /* Scrollable products container */
  .products-scroll-container {
    max-height: 80vh;           /* ← adjust this value to your liking (70vh–85vh common) */
    overflow-y: auto;
    padding-right: 10px;        /* prevent scrollbar overlap with content */
    scrollbar-width: thin;      /* Firefox */
  }

  .products-scroll-container::-webkit-scrollbar {
    width: 8px;
  }

  .products-scroll-container::-webkit-scrollbar-track {
    background: #1a1a1a;
    border-radius: 4px;
  }

  .products-scroll-container::-webkit-scrollbar-thumb {
    background: #555;
    border-radius: 4px;
  }

  .products-scroll-container::-webkit-scrollbar-thumb:hover {
    background: #777;
  }

  /* Product Card */
  .product-card {
    position: relative;
    cursor: pointer;
    transition: all 0.3s ease;
    border: 1px solid #484646;
    height: 100%;
    background: #111;           /* better dark mode contrast */
  }

  .product-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 12px 24px rgba(0, 0, 0, 0.35) !important;
  }

  .product-image-container {
    position: relative;
    overflow: hidden;
    height: 400px;
  }

  .product-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s ease;
  }

  .product-card:hover .product-image {
    transform: scale(1.05);
  }

  .gallery-indicator {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(217, 151, 27, 0.7);
    color: white;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 0.85rem;
  }

  /* Lightbox – unchanged */
  .lightbox-modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.95);
  }

  .lightbox-modal.active {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .lightbox-content {
    position: relative;
    max-width: 1000px;
    width: 95%;
    background: white;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  }

  .lightbox-header {
    padding: 1.5rem;
    background: #000000;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .lightbox-title {
    font-size: 1.5rem;
    font-weight: 600;
    color: #111;
    margin: 0;
  }

  .lightbox-close {
    background: none;
    border: none;
    font-size: 2rem;
    cursor: pointer;
    color: #3d3c3c;
    padding: 0;
  }

  .lightbox-close:hover {
    color: #111;
  }

  .lightbox-body {
    background: #000000;
    padding: 2rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
  }

  .lightbox-images {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .lightbox-main-image {
    width: 100%;
    max-height: 85vh;
    height: auto;
    object-fit: contain;
    border-radius: 4px;
    display: block;
    margin: 0 auto;
  }

  .lightbox-thumbnails {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
    gap: 0.75rem;
  }

  .lightbox-thumbnail {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 4px;
    cursor: pointer;
    border: 2px solid #ddd;
    transition: all 0.3s ease;
  }

  .lightbox-thumbnail:hover,
  .lightbox-thumbnail.active {
    border-color: #2c2c2c;
  }

  .lightbox-info {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .lightbox-price {
    font-size: 1.5rem;
    font-weight: 700;
    color: #222323;
  }

  .lightbox-description {
    color: #090909;
    line-height: 1.6;
    font-size: 0.95rem;
  }

  .lightbox-stock {
    padding: 0.75rem 1rem;
    border-radius: 4px;
    font-weight: 600;
    text-align: center;
  }

  .lightbox-stock.in-stock  { background: #dcfce7; color: #166534; }
  .lightbox-stock.low-stock { background: #fef3c7; color: #92400e; }
  .lightbox-stock.out-of-stock { background: #fee2e2; color: #991b1b; }

  .lightbox-actions {
    display: flex;
    gap: 1rem;
  }

  .lightbox-btn {
    flex: 1;
    padding: 0.75rem 1.5rem;
    font-size: 1rem;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.3s ease;
  }

  .lightbox-btn-primary {
    background: #1e1d1d;
    color: white;
  }

  .lightbox-btn-primary:hover:not(:disabled) {
    background: #252627;
  }

  .lightbox-btn-primary:disabled {
    background: #d1d5db;
    cursor: not-allowed;
  }

  .lightbox-btn-secondary {
    background: #e5e7eb;
    color: #111;
  }

  .lightbox-btn-secondary:hover {
    background: #8aa9d7;
  }

  @media (max-width: 768px) {
    .lightbox-body {
      grid-template-columns: 1fr;
    }
    .lightbox-main-image {
      height: 250px;
    }
    .products-scroll-container {
      max-height: 70vh;
    }
  }
</style>

<h2 class="mb-3 text-center shop-title"
    style="color: #d4a017; font-family: 'Oswald', sans-serif; letter-spacing: 2px; font-size: 2rem;">
  DUKA
</h2>

<div class="container" style="background-color: #000000; padding: 1.5rem; border-radius: 10px; width: 100%; max-width: 1400px; margin: 0 auto;">
  <div class="products-scroll-container">
    <div class="row g-4">
      {% for product in products %}
      <div class="col-12 col-sm-6 col-md-4 col-lg-3">
        <div
          class="card h-100 shadow-sm border-0 product-card"
          onclick="showLightbox('{{ product.id }}', '{{ product.name|escapejs }}', '{{ product.description|escapejs }}', {{ product.price }}, {{ product.stock }})"
        >
          <div class="product-image-container">
            <img
              src="{{ product.image.url }}"
              class="product-image card-img-top"
              alt="{{ product.name }}"
            />
            {% if product.images.count > 0 %}
            <span class="gallery-indicator">
              {{ product.images.count }} more
            </span>
            {% endif %}
          </div>
          <div class="card-body d-flex flex-column">
            <h5 class="card-title fw-semibold">{{ product.name }}</h5>
            <p class="card-text text-muted mb-2">KES {{ product.price }}</p>
            <a
              href="{% url 'add_to_cart' product.id %}"
              class="btn btn-dark mt-auto w-100"
              onclick="event.stopPropagation();"
            >
              🛒 Add to Cart
            </a>
          </div>
        </div>
      </div>
      {% empty %}
      <p class="text-center text-muted col-12">No products available.</p>
      {% endfor %}
    </div>
  </div>
</div>

<!-- Lightbox Modal → exactly the same as yours -->
<div id="lightboxModal" class="lightbox-modal">
  <div class="lightbox-content">
    <div class="lightbox-header">
      <h2 class="lightbox-title" id="lightboxTitle"></h2>
      <button class="lightbox-close" onclick="closeLightbox()">×</button>
    </div>
    <div class="lightbox-body">
      <div class="lightbox-images">
        <img id="lightboxMainImage" src="" alt="Product" class="lightbox-main-image" />
        <div id="lightboxThumbnails" class="lightbox-thumbnails"></div>
      </div>
      <div class="lightbox-info">
        <div class="lightbox-price" id="lightboxPrice"></div>
        <div class="lightbox-description" id="lightboxDescription"></div>
        <div id="lightboxStock" class="lightbox-stock"></div>
        <div class="lightbox-actions">
          <button class="lightbox-btn lightbox-btn-primary" id="lightboxAddBtn" onclick="addToCart()">
            🛒 Add to Cart
          </button>
          <button class="lightbox-btn lightbox-btn-secondary" onclick="closeLightbox()">
            Close
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// Your original script – unchanged
const productImagesData = {
  {% for product in products %}
  {{ product.id }}: [
    "{{ product.image.url }}"
    {% for img in product.images.all %}, "{{ img.image.url }}"{% endfor %}
  ]{% if not forloop.last %},{% endif %}
  {% endfor %}
};

let currentProductId = null;

function showLightbox(productId, name, description, price, stock) {
  currentProductId = productId;
  document.getElementById('lightboxTitle').textContent = name;
  document.getElementById('lightboxPrice').textContent = 'KES ' + price.toFixed(2);
  document.getElementById('lightboxDescription').textContent = description;

  const stockEl = document.getElementById('lightboxStock');
  const addBtn = document.getElementById('lightboxAddBtn');

  if (stock === 0) {
    stockEl.textContent = '❌ Out of Stock';
    stockEl.className = 'lightbox-stock out-of-stock';
    addBtn.disabled = true;
  } else if (stock < 5) {
    stockEl.textContent = '⚠️ Only ' + stock + ' left!';
    stockEl.className = 'lightbox-stock low-stock';
    addBtn.disabled = false;
  } else {
    stockEl.textContent = '✅ In Stock';
    stockEl.className = 'lightbox-stock in-stock';
    addBtn.disabled = false;
  }

  const images = productImagesData[productId] || [];
  document.getElementById('lightboxMainImage').src = images[0] || '';

  const thumbsEl = document.getElementById('lightboxThumbnails');
  thumbsEl.innerHTML = '';

  images.forEach((img, index) => {
    const thumb = document.createElement('img');
    thumb.src = img;
    thumb.className = 'lightbox-thumbnail' + (index === 0 ? ' active' : '');
    thumb.onclick = () => {
      document.getElementById('lightboxMainImage').src = img;
      document.querySelectorAll('.lightbox-thumbnail').forEach((t, i) => {
        t.classList.toggle('active', i === index);
      });
    };
    thumbsEl.appendChild(thumb);
  });

  document.getElementById('lightboxModal').classList.add('active');
}

function closeLightbox() {
  document.getElementById('lightboxModal').classList.remove('active');
  currentProductId = null;
}

function addToCart() {
  if (currentProductId) {
    window.location.href = '/add-to-cart/' + currentProductId + '/';
  }
}

document.getElementById('lightboxModal').addEventListener('click', (e) => {
  if (e.target.id === 'lightboxModal') closeLightbox();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeLightbox();
});
</script>

{% endblock %}
