<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Duka la Kale</title>

{% load static %}

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&display=swap" rel="stylesheet">

<!-- Bootstrap CSS -->
<link rel="stylesheet" href="{% static 'bootstrap/css/bootstrap.min.css' %}">

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<!-- FontAwesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- Custom Site Styles -->
<link rel="stylesheet" href="{% static 'store/css/custom.css' %}">

<!-- Page Specific CSS (IMPORTANT: must be last) -->
{% block extra_css %}{% endblock %}

<style>

/* Global Theme */

body{
background:#000;
color:#eee;
font-family:'Oswald',sans-serif;
}

/* Navbar */

.navbar{
background:#000;
border-bottom:1px solid #222;
}

.navbar-brand{
color:#eaa329 !important;
font-size:1.5rem;
letter-spacing:1px;
}

.navbar-brand:hover{
color:#f2c56b !important;
}

.nav-link{
color:#eaa329 !important;
transition:0.25s;
}

.nav-link:hover{
color:#fff !important;
}

/* Cart badge */

.badge{
font-size:.65rem;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg shadow-sm">
<div class="container">

<a class="navbar-brand fw-bold" href="/">Duka la Kale</a>

<button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarNav">

<ul class="navbar-nav ms-auto gap-3">

<li class="nav-item">
<a class="nav-link active" href="/">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/shop/">Shop</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/gallery/">Gallery</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/contact/">Contact</a>
</li>

<li class="nav-item">

<a class="nav-link position-relative" href="/cart/">
🛒 Cart

<span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
{{ request.session.cart|length|default:0 }}
</span>

</a>

</li>

</ul>

</div>

</div>
</nav>


<!-- MAIN CONTENT -->

<div class="container mt-4">
{% block content %}{% endblock %}
</div>


<!-- JS -->

<script src="{% static 'bootstrap/js/bootstrap.bundle.min.js' %}"></script>

<script src="{% static 'store/js/site.js' %}"></script>

<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

</body>
</html>
